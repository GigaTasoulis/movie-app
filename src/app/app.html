<mat-toolbar class="app-toolbar">
  <span class="app-logo" routerLink="/">🎬 CineVault</span>
  <span class="spacer"></span>
  <nav class="nav-links">
    <button mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Search</button>
    <button mat-button routerLink="/popular" routerLinkActive="active">Popular</button>
    <button mat-button routerLink="/favorites" routerLinkActive="active">Favorites</button>
    <button mat-button routerLink="/collections" routerLinkActive="active">Collections</button>
  </nav>
  <span class="spacer"></span>
  <div class="theme-switcher">
    <button mat-icon-button (click)="setTheme('system')" [class.theme-active]="theme === 'system'" matTooltip="System">
      <mat-icon>monitor</mat-icon>
    </button>
    <button mat-icon-button (click)="setTheme('light')" [class.theme-active]="theme === 'light'" matTooltip="Light">
      <mat-icon>light_mode</mat-icon>
    </button>
    <button mat-icon-button (click)="setTheme('dark')" [class.theme-active]="theme === 'dark'" matTooltip="Dark">
      <mat-icon>dark_mode</mat-icon>
    </button>
  </div>
</mat-toolbar>

<router-outlet />
