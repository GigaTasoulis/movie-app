<div class="search-container">
  <h1>Movie Search</h1>

  <div class="selection-bar" *ngIf="selectedMovies.length > 0">
    <span>{{ selectedMovies.length }} movie(s) selected</span>
    <button mat-raised-button color="accent" (click)="openAddToCollection()">
      Add to Collection
    </button>
  </div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search movies...</mat-label>
    <input matInput [formControl]="searchControl" appSearchInput placeholder="e.g. Inception" />
    <mat-error *ngIf="getErrorMessage()">{{ getErrorMessage() }}</mat-error>
  </mat-form-field>

  <div class="spinner-container" *ngIf="isLoading">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <div class="movies-grid" *ngIf="!isLoading && movies.length > 0">
    <mat-card class="movie-card" *ngFor="let movie of movies" [class.selected]="isSelected(movie.id)">
      <div
        class="poster-hit"
        role="button"
        tabindex="0"
        [attr.aria-label]="'View details for ' + movie.title"
        (click)="onMovieClick(movie.id)"
        (keydown)="onPosterKeydown($event, movie.id)"
      >
        <img mat-card-image [src]="imageBaseUrl + movie.poster_path" [alt]="movie.title + ' poster'" />
      </div>
      <mat-card-content class="movie-card-footer">
        <div class="card-meta">
          <h3>{{ movie.title }}</h3>
          <p>⭐ {{ movie.vote_average | number:'1.1-1' }}</p>
        </div>
        <button
          type="button"
          class="select-pill"
          [class.is-selected]="isSelected(movie.id)"
          (click)="toggleMovieSelection($event, movie)"
          [attr.aria-pressed]="isSelected(movie.id)"
          [attr.aria-label]="
            isSelected(movie.id) ? 'Remove ' + movie.title + ' from collection selection' : 'Select ' + movie.title + ' for a collection'
          "
        >
          <mat-icon aria-hidden="true">{{ isSelected(movie.id) ? 'check_circle' : 'add_circle_outline' }}</mat-icon>
          <span>{{ isSelected(movie.id) ? 'Selected' : 'Select' }}</span>
        </button>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="no-results" *ngIf="!isLoading && currentQuery && movies.length === 0">
    <p>No movies found for "{{ currentQuery }}"</p>
  </div>

  <mat-paginator
    *ngIf="totalResults > 0"
    [length]="totalResults"
    [pageSize]="pageSize"
    [pageIndex]="currentPage - 1"
    (page)="onPageChange($event)"
  ></mat-paginator>
</div>
