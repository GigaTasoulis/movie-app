<div class="atc-dialog">

  <!-- Header -->
  <div class="atc-header">
    <div class="atc-header-left">
      <span class="atc-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </span>
      <div>
        <h2 class="atc-title">Add to Collection</h2>
        <p class="atc-subtitle">
          {{ data.movies.length }} {{ data.movies.length === 1 ? 'movie' : 'movies' }} selected
        </p>
      </div>
    </div>
    <button type="button" class="atc-close-btn" (click)="close()" aria-label="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="atc-body">

    <!-- Empty state -->
    <div class="atc-empty" *ngIf="collections.length === 0">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        <line x1="12" y1="11" x2="12" y2="17"/>
        <line x1="9" y1="14" x2="15" y2="14"/>
      </svg>
      <p>No collections yet.</p>
      <span>Create a collection first to add movies.</span>
    </div>

    <!-- Collection list -->
    <div class="atc-list" *ngIf="collections.length > 0">
      <button
        type="button"
        class="atc-collection-item"
        *ngFor="let collection of collections"
        (click)="addToCollection(collection.id)"
      >
        <span class="atc-collection-folder" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </span>
        <span class="atc-collection-info">
          <span class="atc-collection-name">{{ collection.title }}</span>
          <span class="atc-collection-count">{{ collection.movies.length }} {{ collection.movies.length === 1 ? 'movie' : 'movies' }}</span>
        </span>
        <span class="atc-collection-arrow" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
        </span>
      </button>
    </div>

  </div>

  <!-- Footer -->
  <div class="atc-footer">
    <button type="button" class="atc-cancel-btn" (click)="close()">Cancel</button>
  </div>

</div>
